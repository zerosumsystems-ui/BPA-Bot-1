services:
  - type: web
    name: bpa-bot-trainer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.9.0"
      - key: GEMINI_API_KEY
        sync: false
